# BuildDuty configuration — sample
# Place as .build-duty.yml in your repository root.

AzureDevOps:
  organizations:
    - url: https://dev.azure.com/dnceng
      projects:
        - name: public
          pipelines:
            - id: 1234
              name: sdk-official
              branches:
                - main

GitHub:
  repositories:
    - organization: dotnet
      name: sdk
      issues:
        - name: Build breaks
          query: 'is:issue is:open label:"Build Break"'
