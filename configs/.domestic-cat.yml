name: domestic-cat

azureDevOps:
  organizations:
    - url: https://dev.azure.com/dnceng-public
      projects:
        - name: public
          pipelines:
            - id: 101
              name: dotnet-sdk (Public CI)
              branches:
                - main
              context: >
                Public CI pipeline for dotnet/sdk. Validates PRs and
                branch health for the main branch.

gitHub:
  organizations:
    - name: dotnet
      repositories:
        - name: sdk
          prs:
            - &bot-prs
              name: ".*"
              authors:
                - app/dotnet-maestro
                - dotnet-bot
                - app/dependabot
                - github-actions[bot]
                - vseanreesermsft
              excludeLabels:
                - "wait for release"
                - backport
                - "Branch Lockdown"
                - "DO NOT MERGE"
                - do-not-merge
              context: >
                Open bot/automation PRs.
        - name: installer
          prs:
            - *bot-prs
        - name: templating
          prs:
            - *bot-prs
        - name: workload-versions
          prs:
            - *bot-prs
        - name: dotnet
          prs:
            # SDK codeflow into the VMR only. Matched by title regex (no author
            # restriction) so it catches both maestro forward-flow
            # ("[<branch>] Source code updates from dotnet/sdk") and manual
            # forward-flow ("Forward flow sdk <branch>", which is often opened by
            # a person rather than a bot). General VMR PRs are intentionally not
            # monitored.
            - name: ".*(Source code updates from dotnet/sdk|Forward flow sdk)"
              excludeLabels:
                - "wait for release"
                - backport
                - "Branch Lockdown"
                - "DO NOT MERGE"
                - do-not-merge
              context: >
                SDK codeflow PRs into the VMR (dotnet/dotnet).