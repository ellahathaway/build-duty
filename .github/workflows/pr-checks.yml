name: PR Build and Pack

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Check formatting
        run: dotnet format BuildDuty.slnx --verify-no-changes

  build-and-pack-linux:
    name: Build, Pack, and Install (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build, Pack, and Install
        run: ./eng/build.sh --install

      - name: Verify installation
        run: build-duty --version

  build-and-pack-windows:
    name: Build, Pack, and Install (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build, Pack, and Install
        shell: pwsh
        run: ./eng/build.ps1 -Install

      - name: Verify installation
        shell: pwsh
        run: build-duty --version
